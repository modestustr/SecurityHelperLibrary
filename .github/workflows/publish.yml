name: Publish NuGet Package

on:
  workflow_run:
    workflows: ['Build & Test Suite']
    branches: [ master ]
    types: [ completed ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  publish:
    name: Publish to NuGet.org
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Verify prerequisite workflows
      id: gate
      uses: actions/github-script@v7
      with:
        script: |
          if (context.eventName === 'workflow_dispatch') {
            core.setOutput('ready', 'true');
            core.notice('Manual dispatch: publish gate bypassed.');
            return;
          }

          const sha = context.payload.workflow_run?.head_sha;
          const branch = context.payload.workflow_run?.head_branch || 'master';
          const required = ['Security Pentest Suite', 'Build & Test Suite'];

          const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
          const maxAttempts = 30;
          const waitMs = 10000;

          let runs = [];
          let allPassed = false;

          for (let attempt = 1; attempt <= maxAttempts; attempt++) {
            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha,
              branch,
              per_page: 100
            });

            runs = data.workflow_runs || [];
            allPassed = required.every(name =>
              runs.some(r => r.name === name && r.conclusion === 'success')
            );

            if (allPassed) {
              break;
            }

            const allCompleted = required.every(name =>
              runs.some(r => r.name === name && r.status === 'completed')
            );

            if (allCompleted) {
              break;
            }

            await sleep(waitMs);
          }

          if (!allPassed) {
            const snapshot = required
              .map(name => {
                const r = runs.find(x => x.name === name);
                return `${name}: ${r ? r.conclusion || r.status : 'not_found'}`;
              })
              .join(' | ');
            core.notice(`Publish gate blocked for ${sha}. ${snapshot}`);
            core.setOutput('ready', 'false');
            return;
          }

          core.notice(`Publish gate passed for ${sha}.`);
          core.setOutput('ready', 'true');
    
    - name: Setup .NET
      if: steps.gate.outputs.ready == 'true'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build target frameworks
      if: steps.gate.outputs.ready == 'true'
      run: |
        dotnet build SecurityHelperLibrary/SecurityHelperLibrary.csproj -c Release -f net481
        dotnet build SecurityHelperLibrary/SecurityHelperLibrary.csproj -c Release -f net8.0
    
    - name: Extract Version
      if: steps.gate.outputs.ready == 'true'
      id: version
      run: |
        VERSION=$(grep '<Version>' SecurityHelperLibrary/SecurityHelperLibrary.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
    
    - name: Build Package
      if: steps.gate.outputs.ready == 'true'
      run: |
        dotnet pack SecurityHelperLibrary/SecurityHelperLibrary.csproj \
          -c Release \
          --no-build \
          -o ./nupkg
    
    - name: Check for changes from previous version
      if: steps.gate.outputs.ready == 'true'
      id: check_version
      run: |
        CURRENT_VERSION=$(ls -1 ./nupkg/SecurityHelperLibrary.*.nupkg | sed 's/.*SecurityHelperLibrary\.\(.*\)\.nupkg/\1/' | head -1)
        echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        echo "Current version: $CURRENT_VERSION"
    
    - name: Publish to NuGet
      if: steps.gate.outputs.ready == 'true' && steps.version.outputs.version != ''
      run: |
        dotnet nuget push ./nupkg/SecurityHelperLibrary.${{ steps.version.outputs.version }}.nupkg \
          -k ${{ secrets.NUGET_API_KEY }} \
          -s https://api.nuget.org/v3/index.json \
          --skip-duplicate
    
    - name: Create GitHub Release
      if: steps.gate.outputs.ready == 'true' && steps.version.outputs.version != ''
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release ${{ steps.version.outputs.version }}
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false
    
    - name: Upload Package Artifact
      if: steps.gate.outputs.ready == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package-${{ steps.version.outputs.version }}
        path: ./nupkg/
    
    - name: Publish Status
      if: steps.gate.outputs.ready == 'true'
      run: |
        echo "## NuGet Publish Status 📦" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Package**: SecurityHelperLibrary.${{ steps.version.outputs.version }}.nupkg" >> $GITHUB_STEP_SUMMARY
        echo "- **Repository**: [NuGet.org](https://www.nuget.org/packages/SecurityHelperLibrary/)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Install with:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "dotnet add package SecurityHelperLibrary --version ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "# or" >> $GITHUB_STEP_SUMMARY
        echo "Install-Package SecurityHelperLibrary -Version ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
